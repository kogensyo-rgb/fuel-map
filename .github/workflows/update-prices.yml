name: Update daily price seed

on:
  schedule:
    # 21:05 UTC = 06:05 JST
    - cron: "5 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Check out site
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate daily price seed
        run: node scripts/generate-daily-price-seed.mjs

      - name: Commit updated prices
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/daily-price-seed.json; then
            echo "Price seed is already current."
            exit 0
          fi
          git add data/daily-price-seed.json
          git commit -m "Update daily price seed"
          git push
