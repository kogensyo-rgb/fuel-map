<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>近くのガソリン価格マップ</title>
    <link rel="stylesheet" href="./vendor/leaflet/leaflet.css" />
    <link rel="stylesheet" href="./styles.css?v=20260610-coordinate-first" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="control-panel" aria-label="ガソリン価格コントロール">
        <header class="brand">
          <div class="brand-mark" aria-hidden="true">
            <i data-lucide="fuel"></i>
          </div>
          <div>
            <p class="eyebrow">Nearby fuel finder</p>
            <h1>近くのガソリンスタンド</h1>
          </div>
        </header>

        <section class="tool-block home-block">
          <div class="section-title">
            <span>現在地</span>
            <span id="sourceBadge" class="badge">推定価格</span>
          </div>

          <label class="field">
            <span>場所ラベル</span>
            <input id="addressInput" type="text" value="自宅" autocomplete="street-address" />
          </label>

          <div class="location-grid">
            <label class="field">
              <span>緯度</span>
              <input id="latInput" type="number" step="0.000001" inputmode="decimal" />
            </label>
            <label class="field">
              <span>経度</span>
              <input id="lngInput" type="number" step="0.000001" inputmode="decimal" />
            </label>
          </div>

          <div class="button-row">
            <button id="locateButton" class="primary" type="button" title="現在地を使う">
              <i data-lucide="crosshair"></i>
              <span>現在地</span>
            </button>
            <button id="demoButton" type="button" title="現在地を再取得">
              <i data-lucide="locate-fixed"></i>
              <span>再取得</span>
            </button>
          </div>
        </section>

        <section class="tool-block search-block">
          <div class="section-title">
            <span>検索</span>
            <button id="refreshButton" class="icon-button" type="button" title="スタンドを更新">
              <i data-lucide="refresh-cw"></i>
            </button>
          </div>

          <div class="field-row">
            <label class="field">
              <span>半径</span>
              <select id="radiusInput">
                <option value="1000">1 km</option>
                <option value="2000" selected>2 km</option>
                <option value="3000">3 km</option>
                <option value="5000">5 km</option>
                <option value="8000">8 km</option>
                <option value="10000">10 km</option>
              </select>
            </label>
            <label class="field">
              <span>油種</span>
              <select id="gradeInput">
                <option value="regular" selected>レギュラー</option>
                <option value="premium">ハイオク</option>
                <option value="diesel">軽油</option>
              </select>
            </label>
          </div>

          <div class="field-row">
            <label class="field">
              <span>並び替え</span>
              <select id="sortInput">
                <option value="price" selected>最安値</option>
                <option value="nearCheap">近い安値</option>
                <option value="drop">値下がり順</option>
                <option value="distance">距離順</option>
              </select>
            </label>
            <label class="field">
              <span>価格ソース</span>
              <select id="priceModeInput">
                <option value="demo" selected>自動</option>
                <option value="imported">インポート</option>
              </select>
            </label>
          </div>

          <div class="button-row">
            <label class="button-like" for="priceFile" title="価格 JSON をインポート">
              <i data-lucide="upload"></i>
              <span>価格を取込</span>
            </label>
            <input id="priceFile" class="visually-hidden" type="file" accept="application/json,.json" />
            <button id="templateButton" type="button" title="テンプレートをダウンロード">
              <i data-lucide="file-json"></i>
              <span>テンプレ</span>
            </button>
          </div>
        </section>

        <section class="metric-grid" aria-label="今日の概要">
          <div class="metric">
            <span>平均</span>
            <strong id="avgMetric">--</strong>
          </div>
          <div class="metric">
            <span>最安値</span>
            <strong id="lowMetric">--</strong>
          </div>
          <div class="metric">
            <span>近い安値</span>
            <strong id="nearCheapMetric">--</strong>
          </div>
        </section>

        <section class="deal-panel" aria-label="おすすめスタンド">
          <button id="cheapestButton" class="deal-card" type="button">
            <span>
              <i data-lucide="japanese-yen"></i>
              最安値
            </span>
            <strong id="cheapestName">--</strong>
            <em id="cheapestMeta">--</em>
          </button>
          <button id="nearCheapButton" class="deal-card" type="button">
            <span>
              <i data-lucide="route"></i>
              近い安値
            </span>
            <strong id="nearCheapName">--</strong>
            <em id="nearCheapMeta">--</em>
          </button>
        </section>

        <section class="quick-nav-panel" aria-label="おすすめナビ">
          <a id="cheapestGoogleLink" href="#">
            <i data-lucide="navigation"></i>
            最安 Google マップ
          </a>
          <a id="cheapestAppleLink" href="#">
            <i data-lucide="map"></i>
            最安 Apple マップ
          </a>
          <a id="nearCheapGoogleLink" href="#">
            <i data-lucide="navigation"></i>
            近い Google マップ
          </a>
          <a id="nearCheapAppleLink" href="#">
            <i data-lucide="map"></i>
            近い Apple マップ
          </a>
        </section>

        <section class="station-panel">
          <div class="section-title">
            <span>スタンド</span>
            <span id="stationCount" class="muted">0</span>
          </div>
          <div id="stationList" class="station-list" aria-live="polite"></div>
        </section>
      </aside>

      <main class="map-stage">
        <div id="map" aria-label="近くのガソリンスタンド地図"></div>

        <div class="map-toolbar">
          <div id="statusPill" class="status-pill">
            <i data-lucide="radar"></i>
            <span>準備完了</span>
          </div>
          <label class="date-slider">
            <span id="dateLabel">--</span>
            <input id="dateRange" type="range" min="0" max="13" value="13" />
          </label>
        </div>

        <div class="legend" aria-label="価格変動の凡例">
          <span><b class="legend-dot down"></b>値下げ</span>
          <span><b class="legend-dot flat"></b>同じ</span>
          <span><b class="legend-dot up"></b>値上げ</span>
          <span><b class="legend-dot missing"></b>データなし</span>
        </div>
      </main>
    </div>

    <script src="./vendor/leaflet/leaflet.js"></script>
    <script src="./vendor/lucide/lucide.min.js"></script>
    <script src="./app.js?v=20260610-coordinate-first"></script>
  </body>
</html>
