<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>近くのガソリン価格マップ</title>
    <link rel="stylesheet" href="./vendor/leaflet/leaflet.css" />
    <link rel="stylesheet" href="./styles.css?v=20260610-range-v6" />
  </head>
  <body class="game-v2">
    <div class="app-shell">
      <aside class="control-panel" aria-label="ガソリン価格コントロール">
        <header class="brand">
          <div class="brand-mark" aria-hidden="true">
            <i data-lucide="fuel"></i>
          </div>
          <div>
            <p class="eyebrow">Nearby fuel</p>
            <h1>ガソリン価格マップ</h1>
          </div>
        </header>

        <section class="tool-block search-block">
          <div class="section-title">
            <span>検索条件</span>
            <span id="sourceBadge" class="badge">価格推定</span>
          </div>

          <input id="addressInput" type="hidden" value="現在地" />
          <input id="latInput" type="hidden" />
          <input id="lngInput" type="hidden" />
          <input id="gradeInput" type="hidden" value="regular" />
          <input id="priceModeInput" type="hidden" value="demo" />
          <input id="dateRange" type="hidden" min="0" max="13" value="13" />
          <span id="dateLabel" hidden>--</span>

          <div class="field-row">
            <label class="field">
              <span>半径</span>
              <select id="radiusInput">
                <option value="1000">1 km</option>
                <option value="2000" selected>2 km</option>
                <option value="3000">3 km</option>
                <option value="5000">5 km</option>
                <option value="8000">8 km</option>
                <option value="10000">10 km</option>
              </select>
            </label>
            <label class="field">
              <span>並び替え</span>
              <select id="sortInput">
                <option value="price" selected>推定安値</option>
                <option value="nearCheap">近い推定安値</option>
                <option value="distance">距離順</option>
              </select>
            </label>
          </div>

          <div class="trust-strip" aria-label="データ確認">
            <span><i data-lucide="map-pinned"></i>地図: OSM確認</span>
            <span><i data-lucide="info"></i>価格: 推定</span>
          </div>
        </section>

        <section class="metric-grid" aria-label="今日の概要">
          <div class="metric">
            <span>推定平均</span>
            <strong id="avgMetric">--</strong>
          </div>
          <div class="metric">
            <span>推定最安</span>
            <strong id="lowMetric">--</strong>
          </div>
          <div class="metric">
            <span>近い安値</span>
            <strong id="nearCheapMetric">--</strong>
          </div>
        </section>

        <section class="station-panel">
          <div class="section-title">
            <span>スタンド</span>
            <span id="stationCount" class="muted">0</span>
          </div>
          <div id="stationList" class="station-list" aria-live="polite"></div>
        </section>
      </aside>

      <main class="map-stage">
        <div id="map" aria-label="近くのガソリンスタンド地図"></div>

        <div class="map-toolbar">
          <div id="statusPill" class="status-pill">
            <i data-lucide="radar"></i>
            <span>現在地を取得します</span>
          </div>
        </div>

        <button id="mapLocateButton" class="map-locate-button" type="button" title="現在地を使う">
          <i data-lucide="crosshair"></i>
          <span>現在地</span>
        </button>

        <section class="resource-dock" aria-label="油種を選ぶ">
          <button class="resource-node is-active" type="button" data-grade="regular">
            <span class="resource-icon regular"><i data-lucide="fuel"></i></span>
            <strong>レギュラー</strong>
            <em id="dockRegularPrice">--</em>
          </button>
          <button class="resource-node" type="button" data-grade="premium">
            <span class="resource-icon premium"><i data-lucide="gauge"></i></span>
            <strong>ハイオク</strong>
            <em id="dockPremiumPrice">--</em>
          </button>
          <button class="resource-node" type="button" data-grade="diesel">
            <span class="resource-icon diesel"><i data-lucide="truck"></i></span>
            <strong>軽油</strong>
            <em id="dockDieselPrice">--</em>
          </button>
        </section>
      </main>
    </div>

    <script src="./vendor/leaflet/leaflet.js"></script>
    <script src="./vendor/lucide/lucide.min.js"></script>
    <script src="./app.js?v=20260610-range-v6"></script>
  </body>
</html>
